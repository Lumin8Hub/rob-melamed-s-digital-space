name: Deploy to GitHub Pages (org root site)

# Builds the static, prerendered site and deploys it to the ORG ROOT Pages repo,
# served at https://lumin8hub.github.io/ (root path, base "/").
#
# Why a separate repo: this repo is Lovable-connected, and a *project* repo's
# Pages is served from a subpath (…/rob-melamed-s-digital-space/), which this
# TanStack Start toolchain can't prerender cleanly. The org root site is served
# from "/", which builds cleanly. Source stays here; only the built output is
# pushed to lumin8hub.github.io.
#
# ── ONE-TIME SETUP (until done, the deploy step skips and the run stays green) ──
#   1. Create an empty repo:  Lumin8Hub/lumin8hub.github.io
#   2. Create a token with write access to that repo:
#        • Fine-grained PAT → Repository access: lumin8hub.github.io →
#          Permissions: Contents: Read and write
#        (or a classic PAT with "repo" scope)
#   3. Add it here as a secret:  this repo → Settings → Secrets and variables →
#        Actions → New repository secret → name: ORG_PAGES_TOKEN
#   4. After the first successful deploy, enable Pages on lumin8hub.github.io:
#        Settings → Pages → Build and deployment → Deploy from a branch →
#        Branch: main → / (root)
# ───────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-org-root-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site (prerendered, base "/")
        run: bun run build
        env:
          GITHUB_PAGES: "true"

      - name: Add Pages fallback files
        run: |
          touch dist/client/.nojekyll
          cp dist/client/index.html dist/client/404.html

      - name: Deploy to lumin8hub.github.io
        env:
          TOKEN: ${{ secrets.ORG_PAGES_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::ORG_PAGES_TOKEN secret is not set — skipping deploy. Complete the one-time setup in .github/workflows/deploy.yml."
            exit 0
          fi
          cd dist/client
          git init -q -b main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Deploy from rob-melamed-s-digital-space@${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${TOKEN}@github.com/Lumin8Hub/lumin8hub.github.io.git" main
          echo "Deployed to https://lumin8hub.github.io/"
