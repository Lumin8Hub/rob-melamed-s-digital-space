name: Deploy to GitHub Pages

# Builds the site as a static, prerendered bundle and publishes it to this
# repo's GitHub Pages site (served at https://<owner>.github.io/<repo>/).
#
# The build is gated behind GITHUB_PAGES=true — Lovable's own Cloudflare build
# never sets it, so the in-editor preview and Lovable deploys are unaffected.
#
# ── ONE-TIME SETUP ──────────────────────────────────────────────────────────
#   Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions".
#   No secrets, no PAT, no extra repos required.
# ────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compute Pages base path
        id: base
        run: |
          # Project Pages sites are served under /<repo>/. User/org sites
          # (repo named "<owner>.github.io") are served at "/".
          repo="${GITHUB_REPOSITORY##*/}"
          owner_lc="$(echo "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')"
          if [ "$repo" = "${owner_lc}.github.io" ]; then
            base="/"
          else
            base="/${repo}/"
          fi
          echo "base=${base}" >> "$GITHUB_OUTPUT"
          echo "Pages base: ${base}"

      - name: Build static site
        run: bun run build
        env:
          GITHUB_PAGES: "true"
          PAGES_BASE: ${{ steps.base.outputs.base }}

      - name: Add Pages fallback files
        run: |
          touch dist/client/.nojekyll
          # SPA fallback for deep-link refreshes on unknown routes.
          cp dist/client/index.html dist/client/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
